<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Constellation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <img src="background.jpg"
     style="
       position: fixed;
       inset: 0;
       width: 100%;
       height: 100%;
       object-fit: cover;
       opacity: 0.3;
       z-index: -1;
     ">
     <div class="main-part">
        <div class="zodiac">
            <div class="zodiac-box">
                <div class="gemini"> Gemini </div>
                <div class="constellation">
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                </div>
            </div>
        </div>
        <div class="memory">
            <div class="memory-box">
                <div class="text-para"> The night before graduation, my friends and I sat on the grass outside campus, talking about our plans for the future. We stayed until the stars appeared, knowing that this might be one of the last times we were all together in the same place.</div>
                <img src="memory.png" width="400px" height="auto" alt="Memory Image">
            </div>
        </div>
    </div>
<script src="script.js"></script>    
</body>
</html>
